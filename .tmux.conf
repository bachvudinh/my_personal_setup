# Change prefix from Ctrl+B to Ctrl+A (easier on Mac keyboard)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color support (needed for catppuccin in nvim)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Start windows/panes at 1 (easier to reach on keyboard)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Mouse support (helpful coming from VSCode)
set -g mouse on

# Increase scrollback buffer
set -g history-limit 10000

# Fast escape (important for neovim)
set -sg escape-time 0

# Reload config with Ctrl+A r
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# Split panes with | and - (more intuitive than default " and %)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in same directory
bind c new-window -c "#{pane_current_path}"

# Smart pane switching with Ctrl+hjkl — works seamlessly with smart-splits.nvim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Option(Alt)+hjkl to resize panes (Mac Option key = Alt)
bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l' 'resize-pane -R 3'

# Ctrl+A + number = switch windows
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4

# Status bar — minimal and clean
set -g status-position bottom
set -g status-style bg=default
set -g status-left "#[fg=blue,bold] #S "
set -g status-right "#[fg=yellow] %H:%M #[fg=white]%d %b"
set -g status-left-length 20
set -g window-status-current-format "#[fg=green,bold] #I:#W "
set -g window-status-format "#[fg=white] #I:#W "
